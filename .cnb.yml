# =============================================================================
# CNB CI 配置 - 自动构建并推送测试执行镜像
# =============================================================================
# 触发时机：
#   - push 到 master 分支 → 构建并推送镜像（latest + commit-sha 两个 tag）
#   - push 到 develop / feature/* 分支 → 仅构建验证，不推送
#
# 产出镜像（master 分支）：
#   ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
#   ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:<commit-short-sha>
# =============================================================================

# ── master 分支：构建并推送镜像 ──────────────────────────────────────────────
master:
  push:
    - name: build-and-push
      services:
        - docker  # 声明后流水线内可直接使用 docker 命令，且内置了 CNB 制品库凭据
      stages:
        - name: 设置镜像 Tag
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            echo "构建镜像: ${IMAGE}:latest 和 ${IMAGE}:${CNB_COMMIT_SHORT}"
            echo -n "${IMAGE}"
          exports:
            info: IMAGE_BASE

        - name: 构建镜像
          script: |
            docker build \
              --no-cache \
              --label "build.sha=${CNB_COMMIT_SHORT}" \
              --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --label "build.branch=${CNB_BRANCH}" \
              -t "${IMAGE_BASE}:${CNB_COMMIT_SHORT}" \
              -t "${IMAGE_BASE}:latest" \
              .

        - name: 验证镜像（smoke test）
          script: |
            echo "── Chrome 版本 ──"
            docker run --rm --entrypoint google-chrome "${IMAGE_BASE}:latest" --version
            echo "── ChromeDriver 版本 ──"
            docker run --rm --entrypoint chromedriver "${IMAGE_BASE}:latest" --version
            echo "── pytest 版本 ──"
            docker run --rm --entrypoint pytest "${IMAGE_BASE}:latest" --version
            echo "✅ smoke test 通过"

        - name: 推送镜像
          script: |
            docker push "${IMAGE_BASE}:${CNB_COMMIT_SHORT}"
            docker push "${IMAGE_BASE}:latest"
            echo "✅ 镜像推送成功"
            echo "  ${IMAGE_BASE}:${CNB_COMMIT_SHORT}"
            echo "  ${IMAGE_BASE}:latest"

# ── develop / feature/* 分支：仅构建验证，不推送 ────────────────────────────
develop:
  push:
    - name: build-only
      services:
        - docker
      stages:
        - name: 构建镜像（验证 Dockerfile 可用）
          script: |
            docker build \
              --no-cache \
              -t test-runner:ci-check \
              .

        - name: 验证镜像
          script: |
            docker run --rm --entrypoint google-chrome test-runner:ci-check --version
            docker run --rm --entrypoint chromedriver test-runner:ci-check --version
            docker run --rm --entrypoint pytest test-runner:ci-check --version
            echo "✅ 镜像验证通过（不推送）"

"feature/*":
  push:
    - name: build-only
      services:
        - docker
      stages:
        - name: 构建镜像（验证 Dockerfile 可用）
          script: |
            docker build \
              --no-cache \
              -t test-runner:ci-check \
              .

        - name: 验证镜像
          script: |
            docker run --rm --entrypoint google-chrome test-runner:ci-check --version
            docker run --rm --entrypoint chromedriver test-runner:ci-check --version
            docker run --rm --entrypoint pytest test-runner:ci-check --version
            echo "✅ 镜像验证通过（不推送）"
